name: CF Node Fission

on:
  schedule:
    # 每天北京时间 12:00 (UTC 4:00) 运行一次
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  # === 用户自定义配置区 ===
  TARGET_REGIONS: "AE,HK,US,JP"      # 目标地区，用英文逗号分隔
  PER_REGION_COUNT: "10"             # 每个地区选取的节点数量
  # ======================

jobs:
  fission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fission Script
        run: python generator.py
        env:
          TARGET_REGIONS: ${{ env.TARGET_REGIONS }}
          PER_REGION_COUNT: ${{ env.PER_REGION_COUNT }}
          VMESS_TEMPLATE: ${{ secrets.VMESS_TEMPLATE }}

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add deip.txt
          if git diff --staged --quiet; then
            echo "No changes in deip.txt, skipping commit."
          else
            git commit -m "chore: auto update deip.txt $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
